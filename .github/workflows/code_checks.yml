---
name: Code checks
on:
  push:
    branches:
      - main
    tags:
      - v*.*.*
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      force_release:
        description: Force release
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}-checks
  cancel-in-progress: true

env:
  UV_LINK_MODE: copy
  UV_PYTHON_PREFERENCE: only-managed
  UV_CACHE_DIR: /tmp/.uv-cache
  MISE_INSTALL_FROM_GITHUB: 1
  # The following repository variables control mise-action caching across jobs:
  # - MISE_CACHE_ENABLED: set to 'false' to disable mise action caching; defaults to 'true' when unset
  # - MISE_CACHE_KEY_PREFIX: prefix used for cache keys so different workflows can share/segregate caches

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout current branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: ${{ vars.MISE_CACHE_ENABLED || 'true'}}
          cache_key_prefix: ${{ vars.MISE_CACHE_KEY_PREFIX || 'mise-v0'}}
          version: ${{ vars.MISE_VERSION }}

      - name: Restore uv cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
            uv-${{ runner.os }}

      - name: Setup venv
        run: |
          uv python install
          uv sync --no-group docs

      - name: Check if uv lock file is up to date
        env:
          UV_KEYRING_PROVIDER: subprocess
        run: |
          echo "::group::Check if uv lock file is up to date"
          echo "Detect files that could affect the dynamic versioning if any (git dirty state)"
          git status --porcelain --untracked-files
          echo "Performing 'uv lock' in dry-run mode"
          uv lock --dry-run
          echo "Performing 'uv lock'"
          if ! uv lock --locked ; then
            echo "::error title=uv lock file::The lockfile at 'uv.lock' needs to be updated. To update the lockfile, run 'uv lock'"
            exit 1
          fi
          echo "::endgroup::"

      - name: Minimize uv cache
        run: uv cache prune --ci

      - name: Detect Python version
        id: detect-python-version
        run: |
          echo "python_version=$(python --version | cut -d " " -f2 | cut -d . -f1-2)" >> "${GITHUB_OUTPUT}"

      - name: Restore pre-commit cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ steps.detect-python-version.outputs.python_version }}|${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit checks
        run: |
          echo "::group::Run pre-commit checks"
          pre-commit run --all-files --show-diff-on-failure
          echo "::endgroup::"

  python-checks:
    name: Python checks
    runs-on: ubuntu-latest
    outputs:
      deploy_env: ${{ steps.detect-deploy-env.outputs.deploy_env }}
      is_release: ${{ steps.detect-release.outputs.is_release }}
    steps:
      - name: Detect release run
        id: detect-release
        env:
          IS_RELEASE: ${{ ((github.event_name == 'push' && startsWith(github.ref, 'refs/tags')) || (github.event_name == 'pull_request' && github.head_ref == 'release-please--branches--main') || inputs.force_release) && 'true' || 'false' }}
        run: |
          echo "is_release=${IS_RELEASE}" >> "${GITHUB_OUTPUT}"

      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history is required: versioningit computes the version
          # of the built distribution from git tags and commit distance.
          fetch-depth: 0
          persist-credentials: false

      # Caches are disabled on release runs so that a poisoned cache entry
      # cannot influence the distribution published to (Test)PyPI.
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: ${{ steps.detect-release.outputs.is_release == 'true' && 'false' || vars.MISE_CACHE_ENABLED || 'true' }}
          cache_key_prefix: ${{ vars.MISE_CACHE_KEY_PREFIX || 'mise-v0'}}
          version: ${{ vars.MISE_VERSION }}

      - name: Restore uv cache
        if: steps.detect-release.outputs.is_release != 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
            uv-${{ runner.os }}

      - name: Setup venv
        run: |
          uv python install
          mise run venv:setup

      - name: Python checks
        run: |
          echo "::group::mise run lint"
          mise run lint
          echo "::endgroup::"
          echo "::group::mise run test"
          mise run test
          echo "::endgroup::"

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: generated/junit.xml
          report-type: test_results

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Minimize uv cache
        run: uv cache prune --ci

      - name: Check we can build the distribution
        run: |
          echo "::group::mise run dist"
          mise run dist
          echo "::endgroup::"

      - name: Store the distribution packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: steps.detect-release.outputs.is_release == 'true'
        with:
          name: python-package-distributions
          path: dist/

      - name: Detect environment
        if: steps.detect-release.outputs.is_release == 'true'
        id: detect-deploy-env
        run: |
          echo "deploy_env=${{ startsWith(github.ref, 'refs/tags') && 'pypi' || 'testpypi' }}" >> "${GITHUB_OUTPUT}"

  deploy-release:
    name: Deploy Release
    runs-on: ubuntu-latest
    if: needs.python-checks.outputs.is_release == 'true'
    environment:
      name: ${{ needs.python-checks.outputs.deploy_env }}
      url: ${{ needs.python-checks.outputs.deploy_env == 'pypi' && 'https://pypi.org/project/yamkix/' || 'https://test.pypi.org/project/yamkix/' }}
    permissions:
      id-token: write
    needs:
      - python-checks
    steps:
      - name: Download the distribution packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: ${{ needs.python-checks.outputs.deploy_env == 'pypi' && 'https://upload.pypi.org/legacy/' || 'https://test.pypi.org/legacy/' }}

  mkdocs:
    name: Build doc
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history is required by the git-revision-date-localized
          # mkdocs plugin to render accurate page dates.
          fetch-depth: 0
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: ${{ vars.MISE_CACHE_ENABLED || 'true'}}
          cache_key_prefix: ${{ vars.MISE_CACHE_KEY_PREFIX || 'mise-v0'}}
          version: ${{ vars.MISE_VERSION }}
          mise_toml: |
            [tools]
            uv = "latest"

      - name: Restore uv cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
            uv-${{ runner.os }}

      - name: Setup venv
        run: |
          uv python install
          uv sync --group docs

      - name: Check we can build the docs
        run: |
          echo "::group::build docs with mkdocs"
          mise run docs:build
          echo "::endgroup::"

  integration-tests:
    name: Run Integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: ${{ vars.MISE_CACHE_ENABLED || 'true'}}
          cache_key_prefix: ${{ vars.MISE_CACHE_KEY_PREFIX || 'mise-v0'}}
          version: ${{ vars.MISE_VERSION }}
          mise_toml: |
            [tools]
            uv = "latest"

      - name: Restore uv cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
            uv-${{ runner.os }}

      - name: Setup venv
        run: |
          uv python install
          uv sync --no-dev

      - name: Run integration tests
        run: |
          echo "::group::run integration tests"
          mise run test:integration
          echo "::endgroup::"

  python-versions:
    name: Run tests with various python versions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: ${{ vars.MISE_CACHE_ENABLED || 'true'}}
          cache_key_prefix: ${{ vars.MISE_CACHE_KEY_PREFIX || 'mise-v0'}}
          version: ${{ vars.MISE_VERSION }}
          mise_toml: |
            [tools]
            uv = "latest"

      - name: Restore uv cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
            uv-${{ runner.os }}

      - name: Setup venv
        run: |
          uv python install
          mise run venv:setup

      - name: Run 'test-python-versions' task
        run: |
          echo "::group::mise run test:python-versions"
          mise run test:python-versions
          echo "::endgroup::"

  finalizer:
    if: always()
    runs-on: Ubuntu-latest
    needs:
      - pre-commit
      - python-checks
      - mkdocs
      - integration-tests
      - python-versions
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
